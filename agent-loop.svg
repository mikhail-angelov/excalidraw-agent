<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#666"/>
    </marker>
    <marker id="arrow-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#e03131"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e1e1e">How an AI Agent Works Under the Hood</text>

  <!-- Step 1: User -->
  <rect x="40" y="65" width="140" height="56" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
  <text x="110" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#1971c2">👤 User</text>
  <text x="110" y="107" text-anchor="middle" font-size="10" fill="#1e1e1e">"Draw a diagram"</text>

  <!-- Step 2: LLM -->
  <rect x="240" y="65" width="140" height="56" rx="8" fill="#eebefa" stroke="#9c36b5" stroke-width="2"/>
  <text x="310" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#9c36b5">🧠 LLM</text>
  <text x="310" y="107" text-anchor="middle" font-size="10" fill="#1e1e1e">Decides tool to call</text>

  <!-- Step 3: Agent Loop -->
  <rect x="440" y="65" width="140" height="56" rx="8" fill="#ffd8a8" stroke="#e8590c" stroke-width="2"/>
  <text x="510" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#e8590c">🛠 Agent Loop</text>
  <text x="510" y="107" text-anchor="middle" font-size="10" fill="#1e1e1e">Calls REST API</text>

  <!-- Step 4: Canvas -->
  <rect x="640" y="65" width="120" height="56" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
  <text x="700" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#2f9e44">🎨 Canvas</text>
  <text x="700" y="107" text-anchor="middle" font-size="10" fill="#1e1e1e">Renders result</text>

  <!-- Main flow arrows -->
  <line x1="180" y1="93" x2="230" y2="93" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="93" x2="430" y2="93" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="93" x2="630" y2="93" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Feedback loop: Canvas → LLM (агент смотрит что получилось) -->
  <path d="M700,121 L700,160 L310,160 L310,129" stroke="#e03131" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-loop)"/>
  <text x="500" y="152" text-anchor="middle" font-size="9" fill="#e03131" font-style="italic">get_scene (feedback)</text>

  <!-- Agent Loop detail panel -->
  <rect x="40" y="220" width="720" height="180" rx="10" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="245" font-size="11" font-weight="bold" fill="#666">THE LOOP (simplified):</text>

  <text x="60" y="272" font-size="11" fill="#1e1e1e">  1. Agent calls LLM:  "Here's the canvas state. What should I do?"</text>
  <text x="60" y="292" font-size="11" fill="#1e1e1e">  2. LLM responds:     "Call create_element with { type:'rect', x:100, y:100 }"</text>
  <text x="60" y="312" font-size="11" fill="#1e1e1e">  3. Agent executes:   POST /api/elements → element created on canvas</text>
  <text x="60" y="332" font-size="11" fill="#1e1e1e">  4. Agent feeds back: "Element created. Anything else?"</text>
  <text x="60" y="352" font-size="11" fill="#1e1e1e">  5. LLM responds:     "Call get_scene... call done."</text>

  <line x1="40" y1="365" x2="760" y2="365" stroke="#eee" stroke-width="1"/>
  <text x="60" y="382" font-size="10" fill="#999">This is it. No magic. 90 lines of code. The LLM is just autocomplete with consequences.</text>
</svg>
