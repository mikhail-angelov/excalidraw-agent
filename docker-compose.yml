version: '3.8'

services:
  excalidraw-agent:
    image: ghcr.io/mikhail-angelov/excalidraw-agent:latest
    container_name: excalidraw-agent
    restart: unless-stopped
    networks:
      - proxy-net
    labels:
      monic.enabled: "true"
      monic.check: "http"
      monic.check_http_url: "https://diagram.bconf.com"
      monic.name: "diagram.bconf.com"
      redoproxy.enabled: "true"
      redoproxy.domain: "diagram.bconf.com"
      redoproxy.port: 3000
    env_file:
      - ./.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    command: "node dist/server.js"

networks:
  proxy-net:
    external: true